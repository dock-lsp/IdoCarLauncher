name: Build & Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  DISTRIBUTION: 'temurin'

jobs:
  # 构建 Debug APK
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IdoCarLauncher-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # 构建 Release APK (unsigned)
  build-release:
    runs-on: ubuntu-latest
    needs: [ build-debug ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: IdoCarLauncher-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  # 创建 GitHub Release
  create-release:
    runs-on: ubuntu-latest
    needs: [ build-release ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | head -1 | sed "s/.*versionName '\(.*\)'.*/\1/")
          CODE=$(grep "versionCode" app/build.gradle | head -1 | sed "s/.*versionCode \(.*\).*/\1/")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${CODE}" >> $GITHUB_OUTPUT

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: IdoCarLauncher-debug
          path: debug-artifacts/

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: IdoCarLauncher-release
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "IdoCarLauncher ${{ steps.version.outputs.version }}"
          body: |
            ## IdoCarLauncher ${{ steps.version.outputs.version }}

            ### 更新内容
            - 自动构建版本

            ### 安装说明
            1. 下载 APK 文件
            2. 传输到车机设备
            3. 安装并设置为默认桌面

            ### 构建信息
            - **版本**: ${{ steps.version.outputs.version_name }}
            - **构建号**: ${{ steps.version.outputs.version_code }}
            - **提交**: ${{ github.sha }}
          files: |
            debug-artifacts/*.apk
            release-artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
