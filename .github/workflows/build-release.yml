name: Build & Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  DISTRIBUTION: 'temurin'

jobs:
  # 自动递增版本号
  version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: version
        run: |
          CURRENT_VERSION=$(grep "versionName" app/build.gradle | head -1 | sed "s/.*versionName '\(.*\)'.*/\1/")
          CURRENT_CODE=$(grep "versionCode" app/build.gradle | head -1 | sed "s/.*versionCode \(.*\).*/\1/")
          echo "Current: v${CURRENT_VERSION} (${CURRENT_CODE})"

          # 递增版本号
          IFS='.' read -ra PARTS <<< "$CURRENT_VERSION"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}

          # 检查是否是新的一天，自动递增 patch
          LAST_BUILD_DATE=$(git log -1 --format=%cd --date=short 2>/dev/null || echo "none")
          TODAY=$(date +%Y-%m-%d)

          if [ "$LAST_BUILD_DATE" != "$TODAY" ]; then
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_CODE=$((CURRENT_CODE + 1))

          echo "New: v${NEW_VERSION} (${NEW_CODE})"

          # 更新 build.gradle
          sed -i "s/versionCode ${CURRENT_CODE}/versionCode ${NEW_CODE}/" app/build.gradle
          sed -i "s/versionName '${CURRENT_VERSION}'/versionName '${NEW_VERSION}'/" app/build.gradle

          echo "version_name=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${NEW_CODE}" >> $GITHUB_OUTPUT
          echo "new_version=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add app/build.gradle
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git push

  # 构建 Debug APK
  build-debug:
    runs-on: ubuntu-latest
    needs: [ version-bump ]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'main' || github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.injected.signing.store.file=$(pwd)/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IdoCarLauncher-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # 构建 Release APK (signed)
  build-release:
    runs-on: ubuntu-latest
    needs: [ version-bump ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: IdoCarLauncher-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  # 创建 GitHub Release
  create-release:
    runs-on: ubuntu-latest
    needs: [ build-release, version-bump ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: IdoCarLauncher-release
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.new_version }}
          name: "IdoCarLauncher ${{ needs.version-bump.outputs.new_version }}"
          body: |
            ## IdoCarLauncher ${{ needs.version-bump.outputs.new_version }}

            ### 更新内容
            - 自动构建版本

            ### 安装说明
            1. 下载 `IdoCarLauncher-release.apk`
            2. 传输到车机设备
            3. 安装并设置为默认桌面

            ### 构建信息
            - **版本**: ${{ needs.version-bump.outputs.version_name }}
            - **构建号**: ${{ needs.version-bump.outputs.version_code }}
            - **提交**: ${{ github.sha }}
            - **时间**: ${{ github.event.head_commit.timestamp }}
          files: release-artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
